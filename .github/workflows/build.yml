name: Build Plugin

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PLUGIN_NAME: obs-midi-viz
  OBS_VERSION: "30.2.2"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # LINUX — OBS PPA provides libobs-dev directly; simplest of the three
  # ───────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add OBS PPA and install libobs-dev
        run: |
          sudo add-apt-repository ppa:obsproject/obs-studio -y
          sudo apt-get update -q
          sudo apt-get install -y \
            libobs-dev \
            cmake ninja-build pkg-config \
            qt6-base-dev \
            libasound2-dev \
            libgl-dev \
            libglx-dev \
            libx11-dev \
            libxkbcommon-dev

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: |
          cmake --install build --prefix dist --component obs-midi-viz
          tar -czf ${{ env.PLUGIN_NAME }}-linux-x86_64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PLUGIN_NAME }}-linux-x86_64
          path: ${{ env.PLUGIN_NAME }}-linux-x86_64.tar.gz
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # MACOS — obs-studio was removed as a Homebrew formula (cask only now, no
  # dev headers). Build libobs from source, same pattern as Windows.
  # Cache keyed to OBS version so the slow build only runs once.
  # Phase 1: arm64 only. Universal binary lipo step added once CI is green.
  # ───────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          brew install cmake ninja ffmpeg
          echo "FFMPEG_PREFIX=$(brew --prefix ffmpeg)" >> $GITHUB_ENV

      # ── OBS libobs (cached) ─────────────────────────────────────────────
      - name: Cache OBS build
        id: cache-obs
        uses: actions/cache@v5
        with:
          path: obs-install
          key: obs-${{ env.OBS_VERSION }}-macos-arm64-v3

      - name: Clone OBS source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.OBS_VERSION }} \
            https://github.com/obsproject/obs-studio.git obs-source

      - name: Build libobs from source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          cmake -B obs-build -S obs-source \
            -G Xcode \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_OSX_SYSROOT=$(xcrun --sdk macosx --show-sdk-path) \
            -DENABLE_PLUGINS=OFF \
            -DENABLE_UI=OFF \
            -DENABLE_SCRIPTING=OFF \
            -DENABLE_BROWSER=OFF \
            -DENABLE_WEBSOCKET=OFF \
            -DENABLE_AJA=OFF \
            -DENABLE_DECKLINK=OFF \
            -DCMAKE_PREFIX_PATH="${{ env.FFMPEG_PREFIX }}"

          cmake --build obs-build --target libobs --config Release --parallel

          # cmake --install is a no-op with the Xcode generator for partial builds.
          # Manually assemble the layout that find_package(libobs) expects:
          #   obs-install/Frameworks/libobs.framework   <- framework binary
          #   obs-install/include/obs/**                <- all headers
          #   obs-install/Frameworks/libobs.framework/Resources/cmake/libobsConfig.cmake
          OBS_ROOT="${{ github.workspace }}/obs-install"
          mkdir -p "${OBS_ROOT}/Frameworks"
          cp -R obs-build/libobs/Release/libobs.framework "${OBS_ROOT}/Frameworks/"

          mkdir -p "${OBS_ROOT}/include/obs"
          cp -R obs-source/libobs/. "${OBS_ROOT}/include/obs/"

          # cmake PREFIX_PATH searches <prefix>/lib/cmake/<name>/ universally.
          # The framework-bundle path (<prefix>/<name>.framework/Resources/cmake/)
          # is only searched when the prefix IS the Frameworks directory itself.
          # Use lib/cmake/libobs/ so find_package(libobs) works with obs-install as prefix.
          CFG_DIR="${OBS_ROOT}/lib/cmake/libobs"
          mkdir -p "${CFG_DIR}"
          cat > "${CFG_DIR}/libobsConfig.cmake" << 'CMAKEEOF'
          if(NOT TARGET OBS::libobs)
            get_filename_component(_obs_root "${CMAKE_CURRENT_LIST_DIR}/../../.." ABSOLUTE)
            add_library(OBS::libobs INTERFACE IMPORTED)
            target_include_directories(OBS::libobs INTERFACE "${_obs_root}/include/obs")
            target_link_libraries(OBS::libobs INTERFACE
              "-F${_obs_root}/Frameworks" "-framework libobs")
          endif()
          set(libobs_FOUND TRUE)
          CMAKEEOF

          echo "=== obs-install layout ==="
          find "${OBS_ROOT}" -maxdepth 4 | sort | head -40

      # ── Plugin build ────────────────────────────────────────────────────
      - name: Configure plugin
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_OSX_SYSROOT=$(xcrun --sdk macosx --show-sdk-path) \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/obs-install"

      - name: Build plugin
        run: cmake --build build --parallel

      - name: Package
        run: |
          cmake --install build --prefix dist --component obs-midi-viz
          tar -czf ${{ env.PLUGIN_NAME }}-macos-arm64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PLUGIN_NAME }}-macos-arm64
          path: ${{ env.PLUGIN_NAME }}-macos-arm64.tar.gz
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # WINDOWS — no package manager ships libobs dev headers, so we build OBS
  # from source (just the libobs target, no UI/plugins). Heavy first run,
  # then fully cached by OBS version + runner OS.
  # ───────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64

      # ── OBS source (headers + cmake config) ──────────────────────────────
      - name: Cache OBS build
        id: cache-obs
        uses: actions/cache@v5
        with:
          path: |
            obs-install
            obs-deps
          key: obs-${{ env.OBS_VERSION }}-win-x64-v5

      - name: Clone OBS source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch $env:OBS_VERSION `
            https://github.com/obsproject/obs-studio.git obs-source

      - name: Build libobs from source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          # OBS on Windows does NOT auto-download deps; we must supply them.
          # Download the official pre-built obs-deps (CURL, FFmpeg, zlib, etc.)
          # that OBS's cmake expects to find via CMAKE_PREFIX_PATH.
          Invoke-WebRequest `
            -Uri "https://github.com/obsproject/obs-deps/releases/download/2024-05-08/windows-deps-2024-05-08-x64.zip" `
            -OutFile obs-deps.zip
          Expand-Archive -Path obs-deps.zip -DestinationPath obs-deps

          cmake -B obs-build -S obs-source `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_UI=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_BROWSER=OFF `
            -DENABLE_WEBSOCKET=OFF `
            -DENABLE_UPDATER=OFF `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/obs-deps" `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/obs-install"

          cmake --build obs-build --config Release --target libobs --parallel

          # cmake --install with a partial target build is unreliable on Windows
          # (same issue as macOS with the Xcode generator). Manually assemble the
          # layout that find_package(libobs) expects:
          #   obs-install/include/obs/**               <- all headers
          #   obs-install/lib/obs.lib                  <- import library
          #   obs-install/bin/obs.dll                  <- shared library
          #   obs-install/lib/cmake/libobs/libobsConfig.cmake
          $OBS_ROOT = "${{ github.workspace }}/obs-install"
          New-Item -ItemType Directory -Force "$OBS_ROOT/include/obs" | Out-Null
          Copy-Item -Path "obs-source/libobs/*" -Destination "$OBS_ROOT/include/obs/" -Recurse -Force
          New-Item -ItemType Directory -Force "$OBS_ROOT/lib" | Out-Null
          Copy-Item -Force "obs-build/libobs/Release/obs.lib" "$OBS_ROOT/lib/"
          New-Item -ItemType Directory -Force "$OBS_ROOT/bin" | Out-Null
          Copy-Item -Force "obs-build/libobs/Release/obs.dll" "$OBS_ROOT/bin/"

          $CFG_DIR = "$OBS_ROOT/lib/cmake/libobs"
          New-Item -ItemType Directory -Force $CFG_DIR | Out-Null
          Set-Content -Path "$CFG_DIR/libobsConfig.cmake" -Encoding utf8 -Value @'
          if(NOT TARGET OBS::libobs)
            get_filename_component(_obs_root "${CMAKE_CURRENT_LIST_DIR}/../../.." ABSOLUTE)
            add_library(OBS::libobs SHARED IMPORTED)
            set_target_properties(OBS::libobs PROPERTIES
              IMPORTED_IMPLIB "${_obs_root}/lib/obs.lib"
              IMPORTED_LOCATION "${_obs_root}/bin/obs.dll"
              INTERFACE_INCLUDE_DIRECTORIES "${_obs_root}/include/obs")
          endif()
          set(libobs_FOUND TRUE)
          '@

          Write-Host "=== obs-install layout ==="
          Get-ChildItem "$OBS_ROOT" -Recurse -Depth 4 | Select-Object FullName | Sort-Object FullName | Select-Object -First 40

      # ── Plugin build ──────────────────────────────────────────────────────
      - name: Configure plugin
        run: |
          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/obs-install"

      - name: Build plugin
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Package
        run: |
          cmake --install build --prefix dist --config RelWithDebInfo --component obs-midi-viz
          Compress-Archive -Path dist\* `
            -DestinationPath "${{ env.PLUGIN_NAME }}-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PLUGIN_NAME }}-windows-x64
          path: ${{ env.PLUGIN_NAME }}-windows-x64.zip
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # RELEASE — tag-triggered, waits for all three builds
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/${{ env.PLUGIN_NAME }}-windows-x64/${{ env.PLUGIN_NAME }}-windows-x64.zip
            artifacts/${{ env.PLUGIN_NAME }}-macos-arm64/${{ env.PLUGIN_NAME }}-macos-arm64.tar.gz
            artifacts/${{ env.PLUGIN_NAME }}-linux-x86_64/${{ env.PLUGIN_NAME }}-linux-x86_64.tar.gz
