name: Build Plugin

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PLUGIN_NAME: obs-midi-viz
  OBS_VERSION: "30.2.2"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # LINUX — OBS PPA provides libobs-dev directly; simplest of the three
  # ───────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add OBS PPA and install libobs-dev
        run: |
          sudo add-apt-repository ppa:obsproject/obs-studio -y
          sudo apt-get update -q
          sudo apt-get install -y \
            libobs-dev \
            cmake ninja-build pkg-config \
            qt6-base-dev \
            libasound2-dev \
            libgl-dev \
            libglx-dev \
            libx11-dev \
            libxkbcommon-dev

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: |
          cmake --install build --prefix dist
          tar -czf ${{ env.PLUGIN_NAME }}-linux-x86_64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-linux-x86_64
          path: ${{ env.PLUGIN_NAME }}-linux-x86_64.tar.gz
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # MACOS — obs-studio was removed as a Homebrew formula (cask only now, no
  # dev headers). Build libobs from source, same pattern as Windows.
  # Cache keyed to OBS version so the slow build only runs once.
  # Phase 1: arm64 only. Universal binary lipo step added once CI is green.
  # ───────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools and Qt6
        run: |
          brew install cmake ninja ffmpeg qt@6
          echo "Qt6_DIR=$(brew --prefix qt@6)/lib/cmake/Qt6" >> $GITHUB_ENV
          echo "FFMPEG_PREFIX=$(brew --prefix ffmpeg)"       >> $GITHUB_ENV

      # ── OBS libobs (cached) ─────────────────────────────────────────────
      - name: Cache OBS build
        id: cache-obs
        uses: actions/cache@v4
        with:
          path: obs-install
          key: obs-${{ env.OBS_VERSION }}-macos-arm64-v1

      - name: Clone OBS source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.OBS_VERSION }} \
            https://github.com/obsproject/obs-studio.git obs-source

      - name: Build libobs from source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          cmake -B obs-build -S obs-source \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DENABLE_PLUGINS=OFF \
            -DENABLE_UI=OFF \
            -DENABLE_SCRIPTING=OFF \
            -DENABLE_BROWSER=OFF \
            -DENABLE_WEBSOCKET=OFF \
            -DENABLE_AJA=OFF \
            -DENABLE_DECKLINK=OFF \
            -DCMAKE_PREFIX_PATH="${{ env.FFMPEG_PREFIX }}" \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/obs-install"

          cmake --build obs-build --target libobs --parallel
          cmake --install obs-build --component Development

      # ── Plugin build ────────────────────────────────────────────────────
      - name: Configure plugin
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DQt6_DIR="${{ env.Qt6_DIR }}" \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/obs-install"

      - name: Build plugin
        run: cmake --build build --parallel

      - name: Package
        run: |
          cmake --install build --prefix dist
          tar -czf ${{ env.PLUGIN_NAME }}-macos-arm64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-macos-arm64
          path: ${{ env.PLUGIN_NAME }}-macos-arm64.tar.gz
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # WINDOWS — no package manager ships libobs dev headers, so we build OBS
  # from source (just the libobs target, no UI/plugins). Heavy first run,
  # then fully cached by OBS version + runner OS.
  # ───────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.*"
          arch: win64_msvc2019_64
          cache: true

      # ── OBS source (headers + cmake config) ──────────────────────────────
      - name: Cache OBS build
        id: cache-obs
        uses: actions/cache@v4
        with:
          path: obs-install
          key: obs-${{ env.OBS_VERSION }}-win-x64-v1

      - name: Clone OBS source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch $env:OBS_VERSION `
            https://github.com/obsproject/obs-studio.git obs-source

      - name: Install OBS build deps (vcpkg)
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          # vcpkg is pre-installed on windows-2022 runners at C:\vcpkg
          vcpkg install `
            ffmpeg:x64-windows `
            zlib:x64-windows `
            --triplet x64-windows
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: Build libobs from source
        if: steps.cache-obs.outputs.cache-hit != 'true'
        run: |
          cmake -B obs-build -S obs-source `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_UI=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_BROWSER=OFF `
            -DENABLE_WEBSOCKET=OFF `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/obs-install"

          cmake --build obs-build --config Release --target libobs --parallel
          cmake --install obs-build --config Release --component Development

      # ── Plugin build ──────────────────────────────────────────────────────
      - name: Configure plugin
        run: |
          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DQt6_DIR="$env:Qt6_DIR/lib/cmake/Qt6" `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/obs-install"

      - name: Build plugin
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Package
        run: |
          cmake --install build --prefix dist --config RelWithDebInfo
          Compress-Archive -Path dist\* `
            -DestinationPath "${{ env.PLUGIN_NAME }}-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-windows-x64
          path: ${{ env.PLUGIN_NAME }}-windows-x64.zip
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # RELEASE — tag-triggered, waits for all three builds
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/${{ env.PLUGIN_NAME }}-windows-x64/${{ env.PLUGIN_NAME }}-windows-x64.zip
            artifacts/${{ env.PLUGIN_NAME }}-macos-arm64/${{ env.PLUGIN_NAME }}-macos-arm64.tar.gz
            artifacts/${{ env.PLUGIN_NAME }}-linux-x86_64/${{ env.PLUGIN_NAME }}-linux-x86_64.tar.gz
