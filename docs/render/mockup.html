<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d1a; display: flex; flex-direction: column; align-items: flex-start; gap: 0; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="piano"    width="960" height="440"></canvas>
<canvas id="drums808" width="480" height="480"></canvas>
<canvas id="drumsLP"  width="480" height="480"></canvas>
<canvas id="cc"       width="560" height="140"></canvas>

<script>
// ─── Helpers ─────────────────────────────────────────────────────────────────
function lerpHex(a, b, t) {
  function ch(s,o){ return parseInt(s.slice(o,o+2),16); }
  const ah = a.replace('#',''), bh = b.replace('#','');
  const r = Math.round(ch(ah,0)+(ch(bh,0)-ch(ah,0))*t);
  const g = Math.round(ch(ah,2)+(ch(bh,2)-ch(ah,2))*t);
  const bl = Math.round(ch(ah,4)+(ch(bh,4)-ch(ah,4))*t);
  return '#' + r.toString(16).padStart(2,'0')
             + g.toString(16).padStart(2,'0')
             + bl.toString(16).padStart(2,'0');
}
function lum(hex) {
  const h = hex.replace('#','');
  return 0.299*parseInt(h.slice(0,2),16)/255
       + 0.587*parseInt(h.slice(2,4),16)/255
       + 0.114*parseInt(h.slice(4,6),16)/255;
}

// ─── Piano Roll ──────────────────────────────────────────────────────────────
(function(){
  const cv = document.getElementById('piano');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const kbH = 190, kbY = H - kbH;

  // Solid dark background
  ctx.fillStyle = '#06060f';
  ctx.fillRect(0,0,W,H);

  // Key geometry
  function isWhite(n){ return [0,2,4,5,7,9,11].includes(n%12); }
  let wi = 0; const wIdx={}, noteX={};
  for(let i=0;i<128;i++) if(isWhite(i)) wIdx[i]=wi++;
  const wCount=wi, wkW=W/wCount, bkW=wkW*0.62, bkH=kbH*0.60;
  for(let i=0;i<128;i++){
    if(isWhite(i)) noteX[i]=wIdx[i]*wkW;
    else noteX[i]=noteX[i-1]+wkW-bkW/2;
  }
  function nw(n){ return isWhite(n)?wkW:bkW; }

  // Waterfall background gradient
  const wfGrad = ctx.createLinearGradient(0,0,0,kbY);
  wfGrad.addColorStop(0,'#08081a');
  wfGrad.addColorStop(1,'#0c0c20');
  ctx.fillStyle = wfGrad;
  ctx.fillRect(0,0,W,kbY);

  // Subtle lane separators in waterfall
  for(let i=0;i<128;i++){
    if(!isWhite(i)) continue;
    if((i%12)===0){ // C notes — octave line
      ctx.fillStyle='rgba(80,80,160,0.08)';
      ctx.fillRect(noteX[i],0,1,kbY);
    }
  }

  // Waterfall note blocks — [note, yFromKbTop, height, color, alpha]
  const blocks=[
    // Controller 1 (blue) - C major chord  // close to keyboard = recent
    [60, kbY-22, 22,'#44AAFF', 1.0],
    [64, kbY-18, 18,'#44AAFF', 1.0],
    [67, kbY-14, 14,'#44AAFF', 1.0],
    // Same notes earlier
    [60, kbY-72, 32,'#44AAFF', 0.82],
    [64, kbY-78, 28,'#44AAFF', 0.82],
    [67, kbY-75, 22,'#44AAFF', 0.82],
    // More fragments
    [60, kbY-145,38,'#44AAFF', 0.62],
    [62, kbY-158,25,'#44AAFF', 0.58],
    [65, kbY-135,42,'#44AAFF', 0.65],
    [69, kbY-180,30,'#44AAFF', 0.55],
    [71, kbY-195,48,'#44AAFF', 0.52],
    [72, kbY-220,35,'#44AAFF', 0.48],
    [74, kbY-250,30,'#44AAFF', 0.45],
    [55, kbY-260,40,'#44AAFF', 0.42],
    [48, kbY-295,52,'#44AAFF', 0.38],
    // Controller 2 (red) - offsetting notes
    [57, kbY-28, 20,'#FF4444', 1.0],
    [60, kbY-40, 22,'#CC55FF', 1.0],  // blend on C4
    [52, kbY-92, 35,'#FF4444', 0.80],
    [55, kbY-108,28,'#FF4444', 0.75],
    [59, kbY-140,40,'#FF4444', 0.65],
    [57, kbY-200,55,'#FF4444', 0.55],
    [64, kbY-120,25,'#EE5566', 0.70],  // slight blend on E4
    [76, kbY-170,38,'#FF4444', 0.58],
    [72, kbY-240,42,'#CC2244', 0.48],
    [69, kbY-280,30,'#FF4444', 0.40],
  ];

  for(const [note, y, h, color, alpha] of blocks){
    const x = noteX[note];
    const w = isWhite(note) ? wkW-1 : bkW;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.fillRect(x+0.5, y-h, w-1, h);
  }
  ctx.globalAlpha = 1;

  // Glow at keyboard boundary
  const glow = ctx.createLinearGradient(0,kbY-8,0,kbY+2);
  glow.addColorStop(0,'rgba(100,160,255,0.0)');
  glow.addColorStop(0.5,'rgba(100,160,255,0.35)');
  glow.addColorStop(1,'rgba(100,160,255,0.0)');
  ctx.fillStyle=glow;
  ctx.fillRect(0,kbY-8,W,10);

  // White keys
  const litB=[60,64,67], litR=[57,60];
  for(let i=0;i<128;i++){
    if(!isWhite(i)) continue;
    let fill='#d4d4c8';
    if(litB.includes(i)&&litR.includes(i)) fill='#9955cc';
    else if(litB.includes(i)) fill='#44aaff';
    else if(litR.includes(i)) fill='#ff4444';
    ctx.fillStyle=fill;
    ctx.fillRect(noteX[i],kbY,wkW,kbH);
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.fillRect(noteX[i]+wkW-0.5,kbY,0.5,kbH);
  }
  // White key bottom shadow
  for(let i=0;i<128;i++){
    if(!isWhite(i)) continue;
    const g2=ctx.createLinearGradient(0,kbY+kbH-20,0,kbY+kbH);
    g2.addColorStop(0,'rgba(0,0,0,0)');
    g2.addColorStop(1,'rgba(0,0,0,0.25)');
    ctx.fillStyle=g2;
    ctx.fillRect(noteX[i],kbY+kbH-20,wkW-0.5,20);
  }
  // Black keys
  const litBB=[61,63,66,68,70], litRB=[58,61];
  for(let i=0;i<128;i++){
    if(isWhite(i)) continue;
    let fill='#111';
    if(litBB.includes(i)) fill='#0066aa';
    else if(litRB.includes(i)) fill='#880000';
    ctx.fillStyle=fill;
    ctx.fillRect(noteX[i],kbY,bkW,bkH);
    // Subtle bevel highlight on top of black key
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.fillRect(noteX[i],kbY,bkW,4);
    // Rounded bottom of black key
    const bkGrad=ctx.createLinearGradient(0,kbY+bkH-8,0,kbY+bkH);
    bkGrad.addColorStop(0,'rgba(80,80,80,0)');
    bkGrad.addColorStop(1,'rgba(80,80,80,0.5)');
    ctx.fillStyle=bkGrad;
    ctx.fillRect(noteX[i],kbY+bkH-8,bkW,8);
  }
})();

// ─── Drum Pad Renderer (shared) ───────────────────────────────────────────────
function drawPads(cvId, cfg) {
  const {colorPanel, colorIdle, colorHit, cols, rows, labels, hitPads, decayPads, padStyle} = cfg;
  const cv = document.getElementById(cvId);
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;

  ctx.fillStyle = colorPanel;
  ctx.fillRect(0,0,W,H);

  const minDim = Math.min(W/cols, H/rows);
  const gap = Math.max(2, minDim*0.05);
  const padW = (W - gap*(cols+1)) / cols;
  const padH = (H - gap*(rows+1)) / rows;

  for(let i=0; i<cols*rows; i++){
    const col = i%cols, row = Math.floor(i/cols);
    const cellX = gap + col*(padW+gap);
    const cellY = gap + row*(padH+gap);

    // Pad shape offset
    let dw=padW, dh=padH, ox=0, oy=0;
    if(padStyle===1){ dw=padW*0.84; dh=padH*0.84; ox=(padW-dw)/2; oy=(padH-dh)/2; }
    if(padStyle===2){ const d=Math.min(padW,padH)*0.78; dw=dh=d; ox=(padW-d)/2; oy=(padH-d)/2; }

    const px=cellX+ox, py=cellY+oy;

    let t=0;
    if(hitPads.includes(i)) t=1.0;
    else if(decayPads && decayPads[i]!==undefined) t=decayPads[i];

    const padColor = lerpHex(colorIdle, colorHit, t);

    // Optional inset shadow for depth
    if(padStyle>=1){
      ctx.fillStyle='rgba(0,0,0,0.4)';
      ctx.fillRect(px-1, py-1, dw+2, dh+2);
    }
    ctx.fillStyle=padColor;
    ctx.fillRect(px, py, dw, dh);

    // Hit glow overlay
    if(t>0.05){
      const gg=ctx.createRadialGradient(px+dw/2,py+dh/2,0,px+dw/2,py+dh/2,Math.max(dw,dh)*0.7);
      gg.addColorStop(0,`rgba(255,255,255,${t*0.18})`);
      gg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=gg;
      ctx.fillRect(px,py,dw,dh);
    }

    // Label text
    const label = labels && labels[i] ? labels[i] : '';
    if(label){
      const l = lum(padColor);
      ctx.fillStyle = l>0.45 ? 'rgba(0,0,0,0.85)' : 'rgba(255,255,255,0.85)';
      const fs = Math.max(8, Math.min(Math.floor(dh*0.16), Math.floor(dw*0.28)));
      ctx.font = `bold ${fs}px 'Courier New', monospace`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(label, px+dw/2, py+dh*0.72);
    }
  }
}

// ─── TR-808 ───────────────────────────────────────────────────────────────────
drawPads('drums808', {
  colorPanel: '#1C1208',
  colorIdle:  '#2E1E08',
  colorHit:   '#FF8800',
  cols: 4, rows: 4,
  padStyle: 0,
  labels: ['Bass2','Bass1','Rimshot','Snare','Clap','Snare2','Tom1','HH-C',
           'Tom2','HH-P','Tom3','HH-O','Tom4','Tom5','Crash1','Tom6'],
  hitPads:   [1, 3, 6, 10],
  decayPads: {0:0.55, 5:0.30, 9:0.20, 14:0.12},
});

// ─── Novation Launchpad X ─────────────────────────────────────────────────────
drawPads('drumsLP', {
  colorPanel: '#060606',
  colorIdle:  '#0E0E0E',
  colorHit:   '#6633FF',
  cols: 8, rows: 8,
  padStyle: 1,
  labels: null,
  hitPads:   [0,3,8,11,19,24,27,35,32,43,48,51,56,59],
  decayPads: {1:0.55, 9:0.55, 17:0.55, 25:0.55, 33:0.55, 41:0.55,
              4:0.30, 12:0.30, 20:0.30, 28:0.30, 36:0.30, 44:0.30,
              2:0.15, 10:0.15, 18:0.15, 26:0.15, 34:0.15},
});

// ─── CC Lanes ─────────────────────────────────────────────────────────────────
(function(){
  const cv = document.getElementById('cc');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;

  ctx.fillStyle='#111111';
  ctx.fillRect(0,0,W,H);

  const labels=['Mod','Breath','Expr','Sustain','Vol','Pan','Filter','Reso'];
  const vals=[0.74, 0.28, 0.92, 1.0, 0.62, 0.50, 0.44, 0.18];
  const colorBar='#00AAFF', colorBg='#1a1a30';
  const lanes=8, labelH=26;
  const barArea=H-labelH-6;
  const laneW=W/lanes;

  for(let i=0;i<lanes;i++){
    const x=i*laneW+2;
    const barH=vals[i]*barArea;
    const barY=H-labelH-barH;

    // Lane trough
    ctx.fillStyle=colorBg;
    ctx.fillRect(x, H-labelH-barArea, laneW-4, barArea);

    // Bar fill with gradient
    const barGrad=ctx.createLinearGradient(0,barY,0,H-labelH);
    barGrad.addColorStop(0, vals[i]>0.8 ? '#44FFCC' : '#00AAFF');
    barGrad.addColorStop(1, '#0055AA');
    ctx.fillStyle=barGrad;
    ctx.fillRect(x, barY, laneW-4, barH);

    // Value text (top of bar)
    if(barH>12){
      ctx.fillStyle='rgba(255,255,255,0.75)';
      ctx.font='bold 9px monospace';
      ctx.textAlign='center';
      ctx.fillText(Math.round(vals[i]*100), x+(laneW-4)/2, barY-2);
    }

    // Label
    ctx.fillStyle='#9999bb';
    ctx.font='9px monospace';
    ctx.textAlign='center';
    ctx.fillText(labels[i], x+(laneW-4)/2, H-labelH+14);
  }
})();
</script>
</body>
</html>
